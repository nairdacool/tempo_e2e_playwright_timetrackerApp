name: E2E Regression

on:
  # Triggered by the app repo after a push to master
  repository_dispatch:
    types: [app-deployed]

  # Manual trigger from GitHub UI (useful for debugging)
  workflow_dispatch:

  # Nightly safety net at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

jobs:
  test:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout test repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm test
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
          VALID_USERNAME: ${{ secrets.VALID_USERNAME }}
          VALID_PASSWORD: ${{ secrets.VALID_PASSWORD }}
          VALID_DISPLAY_NAME: ${{ secrets.VALID_DISPLAY_NAME }}
          QAS_TOKEN: ${{ secrets.QAS_TOKEN }}
          QAS_URL: ${{ secrets.QAS_URL }}
          QAS_PROJECT_CODE: ${{ secrets.QAS_PROJECT_CODE }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 15

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results/
          retention-days: 15

      - name: Generate Allure report
        if: always()
        run: npx allure-commandline generate allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: allure-report

      - name: Upload QASphere results
        if: always()
        run: npm run qasphere:upload
        env:
          QAS_TOKEN: ${{ secrets.QAS_TOKEN }}
          QAS_URL: ${{ secrets.QAS_URL }}
          QAS_PROJECT_CODE: ${{ secrets.QAS_PROJECT_CODE }}
