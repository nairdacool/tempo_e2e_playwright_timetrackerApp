name: Trigger E2E Regression

on:
  push:
    branches:
      - master

jobs:
  dispatch:
    name: Notify test repo
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch regression to playwright-tempo-app
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.E2E_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'nairdacool',
              repo: 'tempo_e2e_playwright_timetrackerApp',
              event_type: 'app-deployed',
            });
